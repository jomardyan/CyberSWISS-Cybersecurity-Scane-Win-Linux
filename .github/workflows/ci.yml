# CyberSWISS – Continuous Integration
#
# Runs on every push and pull-request against main/master:
#   1. Bash syntax check  – all linux/*.sh scripts
#   2. PowerShell syntax check – all windows/*.ps1 scripts
#   3. Python lint (flake8) – common/*.py
#   4. Python unit tests (pytest) – tests/
#   5. Script metadata checks – shebang, flags, add_finding(), exit codes, etc.

name: CyberSWISS CI

on:
  push:
    branches: ["main", "master", "develop", "copilot/**"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:   # allow manual triggering from the Actions UI

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 – Bash script syntax check
  # ────────────────────────────────────────────────────────────────────────────
  bash-syntax:
    name: "Bash – Syntax Check (linux/*.sh)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check bash syntax for all Linux scripts
        run: |
          echo "Checking bash syntax for all linux/*.sh scripts..."
          FAILED=0
          for script in linux/*.sh; do
            if bash -n "$script" 2>&1; then
              echo "  ✓ $script"
            else
              echo "  ✗ SYNTAX ERROR: $script"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED bash script(s) have syntax errors."
            exit 1
          fi
          echo "All $( ls linux/*.sh | wc -l ) bash scripts passed syntax check."

      - name: Verify scripts are executable
        run: |
          MISSING=0
          for script in linux/*.sh; do
            if [ ! -x "$script" ]; then
              echo "  ⚠ Not executable: $script"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::warning::$MISSING script(s) are not executable. Run: chmod +x linux/*.sh"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 – PowerShell script syntax check
  # ────────────────────────────────────────────────────────────────────────────
  powershell-syntax:
    name: "PowerShell – Syntax Check (windows/*.ps1)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          # Install pwsh on Ubuntu
          sudo apt-get update -qq
          sudo apt-get install -y -qq powershell 2>/dev/null || \
          (wget -q "https://github.com/PowerShell/PowerShell/releases/download/v7.4.1/powershell_7.4.1-1.deb_amd64.deb" -O /tmp/pwsh.deb && \
           sudo dpkg -i /tmp/pwsh.deb && \
           sudo apt-get install -f -qq)

      - name: Check PowerShell syntax for all Windows scripts
        shell: pwsh
        run: |
          $failed = 0
          $scripts = Get-ChildItem -Path windows -Filter *.ps1
          foreach ($script in $scripts) {
              $errors = $null
              $null = [System.Management.Automation.Language.Parser]::ParseFile(
                  $script.FullName, [ref]$null, [ref]$errors
              )
              if ($errors.Count -gt 0) {
                  Write-Host "  ✗ SYNTAX ERROR: $($script.Name)"
                  $errors | ForEach-Object { Write-Host "    $_" }
                  $failed++
              } else {
                  Write-Host "  ✓ $($script.Name)"
              }
          }
          if ($failed -gt 0) {
              Write-Error "$failed PowerShell script(s) have syntax errors."
              exit 1
          }
          Write-Host "All $($scripts.Count) PowerShell scripts passed syntax check."

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 – Python lint
  # ────────────────────────────────────────────────────────────────────────────
  python-lint:
    name: "Python – Lint (flake8)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint dependencies
        run: pip install flake8

      - name: Run flake8 on common/*.py
        run: |
          flake8 common/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503 \
            --statistics \
            --count

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4 – Python unit tests
  # ────────────────────────────────────────────────────────────────────────────
  python-tests:
    name: "Python – Unit Tests (pytest)"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          pip install pytest-cov
          python -m pytest tests/ \
            --tb=short \
            --cov=common \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────────
  # Job 5 – Script metadata validation
  # ────────────────────────────────────────────────────────────────────────────
  script-metadata:
    name: "Script Metadata – Unified Interface Validation"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Linux script metadata
        run: |
          FAILED=0
          for script in linux/*.sh; do
            name=$(basename "$script")
            # Must have bash shebang
            if ! head -1 "$script" | grep -q '^#!/usr/bin/env bash'; then
              echo "::error file=$script::Missing '#!/usr/bin/env bash' shebang"
              FAILED=$((FAILED+1))
            fi
            # Must support --json flag
            if ! grep -q -- '--json' "$script"; then
              echo "::error file=$script::Missing --json flag support"
              FAILED=$((FAILED+1))
            fi
            # Must support --fix flag
            if ! grep -q -- '--fix' "$script"; then
              echo "::error file=$script::Missing --fix flag support"
              FAILED=$((FAILED+1))
            fi
            # Must define add_finding function
            if ! grep -q 'add_finding()' "$script"; then
              echo "::error file=$script::Missing add_finding() function"
              FAILED=$((FAILED+1))
            fi
            # Must have exit codes
            if ! grep -q 'exit [012]' "$script"; then
              echo "::error file=$script::Missing exit 0/1/2 codes"
              FAILED=$((FAILED+1))
            fi
            # FIX_MODE must default to false
            if ! grep -q 'FIX_MODE=false' "$script"; then
              echo "::error file=$script::FIX_MODE must default to false (read-only by default)"
              FAILED=$((FAILED+1))
            fi
            echo "  ✓ $name"
          done
          [ "$FAILED" -eq 0 ] || exit 1

      - name: Validate PowerShell script metadata
        shell: pwsh
        run: |
          $failed = 0
          foreach ($script in (Get-ChildItem windows -Filter *.ps1)) {
              $content = Get-Content $script.FullName -Raw
              # Must have .SYNOPSIS
              if ($content -notmatch '\.SYNOPSIS') {
                  Write-Host "::error file=$($script.Name)::Missing .SYNOPSIS documentation"
                  $failed++
              }
              # Must have -Json switch
              if ($content -notmatch '\[switch\]\s*\$Json') {
                  Write-Host "::error file=$($script.Name)::Missing [switch]$Json parameter"
                  $failed++
              }
              # Must have -Fix switch
              if ($content -notmatch '\[switch\]\s*\$Fix') {
                  Write-Host "::error file=$($script.Name)::Missing [switch]$Fix parameter"
                  $failed++
              }
              # Must have Add-Finding function
              if ($content -notmatch 'function Add-Finding') {
                  Write-Host "::error file=$($script.Name)::Missing Add-Finding function"
                  $failed++
              }
              # Must have CyberSWISS attribution
              if ($content -notmatch 'CyberSWISS') {
                  Write-Host "::error file=$($script.Name)::Missing CyberSWISS attribution"
                  $failed++
              }
              Write-Host "  ✓ $($script.Name)"
          }
          if ($failed -gt 0) { exit 1 }

      - name: Validate script ID uniqueness
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          ids = {}
          for p in sorted(Path("linux").glob("*.sh")) + sorted(Path("windows").glob("*.ps1")):
              content = p.read_text(errors="replace")
              for m in re.finditer(r'SCRIPT_ID[=:]\s*["\']?([A-Z]\d+)', content):
                  sid = m.group(1)
                  if sid in ids:
                      print(f"::error::Duplicate SCRIPT_ID {sid!r} in {p.name} and {ids[sid]}")
                  else:
                      ids[sid] = p.name
          print(f"✓ {len(ids)} unique script IDs validated.")
          PYEOF

  # ────────────────────────────────────────────────────────────────────────────
  # Job 6 – Script functional smoke test (run each script in --json mode)
  # ────────────────────────────────────────────────────────────────────────────
  bash-functional:
    name: "Bash – Functional Smoke Test (--json output)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x linux/*.sh

      - name: Install common test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq

      - name: Run each Linux script in --json mode and validate output
        run: |
          FAILED=0
          PASSED=0
          for script in linux/*.sh; do
            name=$(basename "$script")
            # Run with a timeout; script is NOT run as root so many checks will WARN/INFO – that's fine
            output=$(timeout 60 bash "$script" --json 2>/dev/null) || true
            if [ -z "$output" ]; then
              echo "  ⚠ No output: $name (may require root – acceptable in CI)"
              continue
            fi
            # Validate JSON structure
            if echo "$output" | jq -e '.findings | type == "array"' >/dev/null 2>&1; then
              count=$(echo "$output" | jq '.findings | length')
              echo "  ✓ $name – $count finding(s)"
              PASSED=$((PASSED+1))
            else
              echo "  ✗ INVALID JSON: $name"
              echo "    Output: $(echo "$output" | head -3)"
              echo "::error file=$script::Script did not produce valid JSON findings output"
              FAILED=$((FAILED+1))
            fi
          done
          echo ""
          echo "Results: $PASSED passed, $FAILED failed"
          [ "$FAILED" -eq 0 ] || exit 1

  # ────────────────────────────────────────────────────────────────────────────
  # Job 7 – Runner integration test
  # ────────────────────────────────────────────────────────────────────────────
  runner-integration:
    name: "Python – Runner Integration Test"
    runs-on: ubuntu-latest
    needs: [python-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Make Linux scripts executable
        run: chmod +x linux/*.sh

      - name: Test runner --help
        run: python common/runner.py --help

      - name: Test runner --dry-run (linux only)
        run: python common/runner.py --os linux --dry-run

      - name: Test runner --dry-run with --fix flag
        run: python common/runner.py --os linux --dry-run --fix

      - name: Test runner --dry-run produces valid JSON
        run: |
          python common/runner.py --os linux --dry-run --json | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Scripts listed: {len(d.get(\"scripts\", []))}')"

      - name: Test report generator (CSV + text output)
        run: |
          python3 - <<'PYEOF'
          import sys, json
          sys.path.insert(0, "common")
          from report_generator import generate_csv, generate_text

          sample = {
              "cyberswiss_report": True,
              "generated_at": "2026-01-01T00:00:00+00:00",
              "host": "ci-runner",
              "scripts_run": 1,
              "total_findings": 1,
              "fail_count": 1,
              "warn_count": 0,
              "results": [{
                  "script": "L01_password_policy",
                  "host": "ci-runner",
                  "findings": [{
                      "id": "L01-C1", "name": "Test Finding",
                      "severity": "High", "status": "FAIL",
                      "detail": "CI test detail", "remediation": "CI test remedy",
                      "timestamp": "2026-01-01T00:00:00Z"
                  }]
              }]
          }
          csv_out = generate_csv(sample)
          assert "L01-C1" in csv_out, "CSV output missing finding ID"
          assert "FAIL" in csv_out, "CSV output missing status"
          text_out = generate_text(sample)
          assert "ci-runner" in text_out, "Text output missing hostname"
          assert "L01-C1" in text_out, "Text output missing finding ID"
          print("✓ CSV and text report generation working correctly")
          PYEOF

      - name: Test DB scan history & drift detection
        run: |
          python3 - <<'PYEOF'
          import sys, json, tempfile
          from pathlib import Path
          sys.path.insert(0, "common")
          from db import ScanDatabase, format_drift_report

          sample = {
              "cyberswiss_report": True,
              "generated_at": "2026-01-01T00:00:00+00:00",
              "host": "ci-runner",
              "scripts_run": 1,
              "total_findings": 1,
              "fail_count": 1,
              "warn_count": 0,
              "results": [{
                  "script": "L07_ssh_posture",
                  "host": "ci-runner",
                  "findings": [{
                      "id": "L07-C1", "name": "SSH Root Login",
                      "severity": "Critical", "status": "FAIL",
                      "detail": "PermitRootLogin yes", "remediation": "Set PermitRootLogin no",
                      "timestamp": "2026-01-01T00:00:00Z"
                  }]
              }]
          }

          with tempfile.TemporaryDirectory() as d:
              db = ScanDatabase(db_path=Path(d) / "ci.db")
              sid = db.save_scan(sample)
              assert sid == 1, f"Expected scan_id=1, got {sid}"
              scans = db.list_scans()
              assert len(scans) == 1, "Expected 1 scan in history"

              # Drift: add a new finding
              sample2 = json.loads(json.dumps(sample))
              sample2["results"][0]["findings"].append({
                  "id": "L07-C2", "name": "SSH Empty Password",
                  "severity": "High", "status": "FAIL",
                  "detail": "PermitEmptyPasswords yes", "remediation": "Set PermitEmptyPasswords no",
                  "timestamp": "2026-01-02T00:00:00Z"
              })
              drift = db.detect_drift(sample2)
              assert drift["has_drift"], "Expected drift to be detected"
              assert len(drift["new_findings"]) == 1, "Expected 1 new finding"
              print(format_drift_report(drift, no_colour=True))
          print("✓ DB scan history and drift detection working correctly")
          PYEOF
